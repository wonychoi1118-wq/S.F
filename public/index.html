<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>급식 알레르기 학생 관리 앱</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
    h1, h2 { color: #2c3e50; }
    .container { display: flex; gap: 20px; flex-wrap: wrap; }
    .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
    form div { margin-bottom: 12px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select, button { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:hover { background-color: #2980b9; }
    .student-card { border: 1px solid #e0e0e0; padding: 10px; margin-bottom: 8px; border-radius: 5px; background: #fff; }
    .highlight { background-color: #ffeb3b !important; border: 2px solid #f39c12 !important; font-weight: bold; }
    .warning-tag { color: #d32f2f; font-weight: bold; }
    img { max-width: 100%; height: auto; margin-top: 10px; border-radius: 5px; }
  </style>
</head>
<body>

  <h1>🏫 급식 식단 & 알레르기 학생 관리 시스템</h1>

  <div class="container">
    <!-- 1. 학생 정보 입력 -->
    <div class="card">
      <h2>학생 정보 등록</h2>
      <form id="studentForm">
        <div>
          <label>학년/반</label>
          <div style="display: flex; gap: 5px;">
            <input type="number" id="grade" placeholder="학년" required min="1">
            <input type="number" id="classNum" placeholder="반" required min="1">
            <input type="number" id="studentNum" placeholder="번호" required min="1">
          </div>
        </div>
        <div>
          <label>이름</label>
          <input type="text" id="name" placeholder="학생 이름" required>
        </div>
        <div>
          <label>유형</label>
          <select id="type">
            <option value="알레르기">알레르기</option>
            <option value="종교">종교</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div>
          <label>못 먹는 식품 번호 (1~19번, 쉼표로 구분)</label>
          <input type="text" id="restrictedFoods" placeholder="예: 1, 5, 12">
        </div>
        <button type="submit">학생 등록</button>
      </form>
    </div>

    <!-- 2. 급식표 이미지 분석 -->
    <div class="card">
      <h2>오늘의 급식표 분석 (AI)</h2>
      <input type="file" id="imageInput" accept="image/*">
      <button onclick="analyzeImage()">급식표 AI 분석 실행</button>
      <div id="status"></div>
      <div id="detectedInfo" style="margin-top: 10px;"></div>
      <img id="preview" src="" style="display:none;">
    </div>
  </div>

  <hr style="margin: 30px 0;">

  <!-- 3. 학년 및 반별 목록 조회 -->
  <h2>📋 학생 목록 및 알레르기 주의 표시</h2>
  <div>
    <label style="display:inline-block; width: auto;">조회 필터: </label>
    <select id="filterGrade" onchange="renderStudents()" style="width: 100px; display:inline-block;">
      <option value="all">전체 학년</option>
      <option value="1">1학년</option>
      <option value="2">2학년</option>
      <option value="3">3학년</option>
    </select>
    <select id="filterClass" onchange="renderStudents()" style="width: 100px; display:inline-block;">
      <option value="all">전체 반</option>
      <option value="1">1반</option>
      <option value="2">2반</option>
      <option value="3">3반</option>
    </select>
  </div>

  <div id="studentList" style="margin-top: 15px;"></div>

  <script>
    let students = [];
    let activeFoodNumbers = []; // AI가 인식한 오늘 급식의 알레르기 번호들

    // 학생 등록
    document.getElementById('studentForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const grade = document.getElementById('grade').value;
      const classNum = document.getElementById('classNum').value;
      const studentNum = document.getElementById('studentNum').value;
      const name = document.getElementById('name').value;
      const type = document.getElementById('type').value;
      
      const rawFoods = document.getElementById('restrictedFoods').value;
      const restrictedFoods = rawFoods.split(',')
        .map(n => parseInt(n.trim()))
        .filter(n => !isNaN(n));

      students.push({ grade, classNum, studentNum, name, type, restrictedFoods });
      
      alert('학생이 등록되었습니다.');
      document.getElementById('studentForm').reset();
      renderStudents();
    });

    // 학생 목록 출력
    function renderStudents() {
      const listDiv = document.getElementById('studentList');
      const selectedGrade = document.getElementById('filterGrade').value;
      const selectedClass = document.getElementById('filterClass').value;

      listDiv.innerHTML = '';

      const filtered = students.filter(s => {
        const matchGrade = selectedGrade === 'all' || s.grade === selectedGrade;
        const matchClass = selectedClass === 'all' || s.classNum === selectedClass;
        return matchGrade && matchClass;
      });

      if (filtered.length === 0) {
        listDiv.innerHTML = '<p>등록된 학생이 없거나 조건에 맞는 학생이 없습니다.</p>';
        return;
      }

      filtered.forEach(s => {
        // AI가 인식한 식단 번호 중 학생이 못 먹는 번호가 포함되어 있는지 확인
        const hasConflict = s.restrictedFoods.some(num => activeFoodNumbers.includes(num));

        const card = document.createElement('div');
        card.className = `student-card ${hasConflict ? 'highlight' : ''}`;
        
        card.innerHTML = `
          <strong>[${s.grade}학년 ${s.classNum}반 ${s.studentNum}번] ${s.name}</strong> 
          (${s.type}) 
          <br>
          <small>제한 식품 번호: ${s.restrictedFoods.join(', ') || '없음'}</small>
          ${hasConflict ? '<br><span class="warning-tag">⚠️ 오늘 급식 주의 대상 학생!</span>' : ''}
        `;
        listDiv.appendChild(card);
      });
    }

    // 급식표 이미지 AI 분석 함수
    async function analyzeImage() {
      const fileInput = document.getElementById('imageInput');
      const statusDiv = document.getElementById('status');
      const detectedDiv = document.getElementById('detectedInfo');
      const previewImg = document.getElementById('preview');

      if (!fileInput.files[0]) {
        alert('급식표 이미지를 선택해주세요.');
        return;
      }

      const file = fileInput.files[0];
      statusDiv.innerText = 'AI 분석 중... 잠시만 기다려주세요.';

      // 이미지 미리보기
      const reader = new FileReader();
      reader.onload = async function(e) {
        previewImg.src = e.target.result;
        previewImg.style.display = 'block';

        try {
          // Vercel Serverless Function 호출
          const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              imageBase64: e.target.result,
              mimeType: file.type
            })
          });

          const data = await response.json();

          if (response.ok) {
            activeFoodNumbers = data.numbers || [];
            statusDiv.innerText = '분석 완료!';
            detectedDiv.innerHTML = `<strong>오늘 급식 알레르기 번호:</strong> ${activeFoodNumbers.join(', ')}`;
            // 학생 목록 재갱신하여 강조 표시 반영
            renderStudents();
          } else {
            statusDiv.innerText = '오류 발생: ' + data.error;
          }
        } catch (err) {
          console.error(err);
          statusDiv.innerText = '분석 중 오류가 발생했습니다.';
        }
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
